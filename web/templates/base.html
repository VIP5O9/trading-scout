<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Trading Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="{% if active == 'status' %}active{% endif %}">Status</a>
            <a href="/portfolio" class="{% if active == 'portfolio' %}active{% endif %}">Portfolio</a>
            <a href="/sectors" class="{% if active == 'sectors' %}active{% endif %}">Sectors</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        Read-only view. All actions happen in your Telegram chat.
    </footer>
</body>
</html>
